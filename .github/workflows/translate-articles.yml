name: Translate Articles — All 6 Indian Languages

on:
  schedule:
    # Every 4 hours, offset by 2 hours from rewrite job to avoid API conflicts
    # = 3 AM, 7 AM, 11 AM, 3 PM, 7 PM, 11 PM UTC
    # = 8:30 AM, 12:30 PM, 4:30 PM, 8:30 PM, 12:30 AM, 4:30 AM IST
    - cron: '0 3,7,11,15,19,23 * * *'
  workflow_dispatch:
    inputs:
      lang:
        description: 'Language codes e.g. hi,bn,mr,ta,gu (empty = all)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  translate-all-languages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Translate into all 6 Indian languages
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CLOUDFLARE_DEPLOY_HOOK_URL: ${{ secrets.CLOUDFLARE_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "${{ github.event.inputs.lang }}" ]; then
            node scripts/translate-articles-v2.js --lang=${{ github.event.inputs.lang }}
          else
            node scripts/translate-articles-v2.js
          fi
