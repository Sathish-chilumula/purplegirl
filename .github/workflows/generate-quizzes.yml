name: Weekly Generate Quizzes

on:
  schedule:
    # Runs at 2 AM IST every Thursday and Sunday (20:30 UTC Wed & Sat)
    - cron: '30 20 * * 3,6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run generation script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/generate-quizzes.js

      - name: Commit updated quiz titles bank
        run: |
          git config --global user.name "PurpleGirl Bot"
          git config --global user.email "bot@purplegirl.in"
          git config core.autocrlf false
          git config core.filemode false
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "chore: update quiz titles bank after generation [skip ci]"
            git checkout .
            git clean -fd
            git pull --rebase
            git push
          fi
