name: Daily Translation Machine

on:
  schedule:
    - cron: '0 3 * * *'   # 3 AM daily (after content generation at 2 AM)
  workflow_dispatch:        # Allow manual trigger from GitHub UI
    inputs:
      lang:
        description: 'Language to translate (hi, te, or all)'
        required: false
        default: 'all'
      limit:
        description: 'Max questions to translate per run'
        required: false
        default: '50'

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install ts-node typescript @supabase/supabase-js @types/node

      - name: Run translation script
        run: |
          npx ts-node --project tsconfig.json scripts/generate-translations.ts \
            --lang=${{ github.event.inputs.lang || 'all' }} \
            --limit=${{ github.event.inputs.limit || '50' }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
