name: Daily Generate Articles

on:
  schedule:
    # Runs at 1 AM IST daily (19:30 UTC)
    - cron: '30 19 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm install
        
      - name: Run generation script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CLOUDFLARE_DEPLOY_HOOK_URL: ${{ secrets.CLOUDFLARE_DEPLOY_HOOK_URL }}
        run: node scripts/generate-articles.js
        
      - name: Commit updated titles-bank.json
        run: |
          git config --global user.name "PurpleGirl Bot"
          git config --global user.email "bot@purplegirl.in"
          git add scripts/titles-bank.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update titles bank after daily generation" && git push)
