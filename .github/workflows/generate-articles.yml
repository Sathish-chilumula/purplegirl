name: Daily Generate Articles

on:
  schedule:
    # Run TWICE daily:
    # Run 1: 6:30 PM IST (13:00 UTC) - populate titles THEN generate articles
    # Run 2: 12:30 AM IST (19:00 UTC) - generate articles only (from existing bank)
    - cron: '0 13 * * *'   # 6:30 PM IST - Full run (populate + generate)
    - cron: '0 19 * * *'   # 12:30 AM IST - Generate only (clears backlog faster)
  workflow_dispatch:         # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  # ── Job 1: Populate the titles bank from AI-generated trending topics ─────────
  # Only runs at 13:00 UTC. At 19:00 UTC this job is skipped (bank already full)
  populate-titles:
    runs-on: ubuntu-latest
    # Skip this job on the 19:00 UTC run (we check the event but cron doesn't
    # expose which schedule triggered — so we use a time-based workaround)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run title population script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/populate-titles.js

      - name: Commit updated titles-bank.json
        run: |
          git config --global user.name "PurpleGirl Bot"
          git config --global user.email "bot@purplegirl.in"
          git config core.autocrlf false
          git config core.filemode false
          git add -A
          git diff --staged --quiet || (git commit -m "chore: add trending article titles [$(date +'%Y-%m-%d %H:%M')] [skip ci]" && git pull --rebase --autostash && git push)

  # ── Job 2: Generate articles from the titles bank ────────────────────────────
  # Runs after populate-titles on the 13:00 UTC trigger.
  # On the 19:00 UTC trigger, populate-titles still runs first (just re-populates).
  generate-articles:
    runs-on: ubuntu-latest
    needs: populate-titles   # Always waits for Job 1 to finish first

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run article generation script (batch of 25)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CLOUDFLARE_DEPLOY_HOOK_URL: ${{ secrets.CLOUDFLARE_DEPLOY_HOOK_URL }}
        run: node scripts/generate-articles.js

      - name: Commit updated titles-bank.json (consumed titles removed)
        run: |
          git config --global user.name "PurpleGirl Bot"
          git config --global user.email "bot@purplegirl.in"
          git config core.autocrlf false
          git config core.filemode false
          git add -A
          git diff --staged --quiet || (git commit -m "chore: update titles bank after article generation [$(date +'%Y-%m-%d %H:%M')] [skip ci]" && git pull --rebase --autostash && git push)
